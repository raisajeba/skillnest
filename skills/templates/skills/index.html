{% extends 'base.html' %}

{% block content %}

<h2>All Skills</h2>

{% for skill in skills %}
    <div class="card mb-3 p-3">
        <h5>{{ skill.title }}</h5>
        <p>{{ skill.description|truncatewords:10 }}</p>

        <a href="{% url 'skill_detail' skill.pk %}" class="btn btn-primary btn-sm">View</a>
    </div>
{% endfor %}

{% endblock %}
